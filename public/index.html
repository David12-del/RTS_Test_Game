<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Arena</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a0f;
            color: #eee;
            overflow: hidden;
            user-select: none;
        }

        /* ============ LOBBY SCREEN ============ */
        #lobby-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .lobby-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 80%, rgba(233, 69, 96, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(68, 136, 255, 0.1) 0%, transparent 40%);
            pointer-events: none;
        }

        #lobby-screen h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 50%, #4488ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(233, 69, 96, 0.5);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .lobby-subtitle {
            color: #666;
            font-size: 18px;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .lobby-box {
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 16px;
            padding: 30px 50px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        #lobby-screen input {
            width: 280px;
            padding: 15px 25px;
            font-size: 18px;
            font-family: 'Rajdhani', sans-serif;
            border: 2px solid rgba(233, 69, 96, 0.5);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        #lobby-screen input:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }

        #lobby-screen button {
            width: 280px;
            padding: 15px 30px;
            font-size: 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #lobby-screen button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }

        #lobby-screen button:disabled {
            background: #333;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .lobby-info {
            margin-top: 30px;
            color: #888;
            font-size: 14px;
        }

        .lobby-status {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
        }

        .lobby-status.waiting {
            background: rgba(255, 200, 0, 0.2);
            color: #ffc800;
            border: 1px solid rgba(255, 200, 0, 0.3);
        }

        .lobby-status.playing {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 1px solid rgba(0, 255, 100, 0.3);
        }

        /* ============ GAME CONTAINER ============ */
        #game-container {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #gameCanvas {
            display: block;
            background: #08080c;
        }

        /* ============ UI OVERLAY ============ */
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }

        .ui-panel {
            background: rgba(10, 10, 20, 0.85);
            border: 1px solid rgba(233, 69, 96, 0.4);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 10px;
            backdrop-filter: blur(5px);
            min-width: 150px;
        }

        .ui-panel h3 {
            color: #e94560;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-family: 'Orbitron', sans-serif;
        }

        .ui-panel .value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
        }

        .ui-panel .bar {
            margin-top: 8px;
            height: 6px;
            background: #1a1a2e;
            border-radius: 3px;
            overflow: hidden;
        }

        .ui-panel .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            transition: width 0.3s;
        }

        /* ============ WAVE TIMER ============ */
        #wave-timer {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, 0.9);
            border: 1px solid rgba(233, 69, 96, 0.5);
            border-radius: 12px;
            padding: 12px 30px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        #wave-timer .wave-label {
            color: #e94560;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
        }

        #wave-timer .timer {
            color: #fff;
            font-size: 32px;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
        }

        /* ============ HOTBAR ============ */
        #hotbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(10, 10, 20, 0.9);
            border: 1px solid rgba(233, 69, 96, 0.4);
            border-radius: 12px;
            padding: 10px 15px;
            backdrop-filter: blur(5px);
        }

        .hotbar-slot {
            width: 60px;
            height: 60px;
            background: rgba(30, 30, 50, 0.8);
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .hotbar-slot:hover {
            border-color: #666;
        }

        .hotbar-slot.active {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.2);
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
        }

        .hotbar-slot .key {
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: 11px;
            color: #666;
            font-weight: 700;
        }

        .hotbar-slot .icon {
            font-size: 24px;
        }

        .hotbar-slot .name {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }

        .hotbar-slot .ammo {
            position: absolute;
            bottom: 4px;
            right: 6px;
            font-size: 10px;
            color: #ff6b6b;
            font-weight: 700;
        }

        /* ============ BUILD MENU ============ */
        #build-menu {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 10px;
            background: rgba(10, 10, 20, 0.95);
            border: 1px solid rgba(68, 136, 255, 0.5);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(5px);
        }

        #build-menu.visible {
            display: flex;
        }

        .build-option {
            text-align: center;
            padding: 12px 18px;
            border-radius: 8px;
            background: rgba(30, 30, 50, 0.8);
            border: 2px solid #333;
            transition: all 0.2s;
            min-width: 80px;
        }

        .build-option:hover {
            border-color: #4488ff;
            background: rgba(68, 136, 255, 0.15);
        }

        .build-option.active {
            border-color: #4488ff;
            background: rgba(68, 136, 255, 0.3);
            box-shadow: 0 0 20px rgba(68, 136, 255, 0.4);
        }

        .build-option .key {
            font-size: 14px;
            font-weight: bold;
            color: #4488ff;
            margin-bottom: 4px;
        }

        .build-option .name {
            font-size: 13px;
            color: #fff;
        }

        .build-option .cost {
            font-size: 11px;
            color: #00ff64;
            margin-top: 4px;
        }

        /* ============ MINIMAP ============ */
        #minimap {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 180px;
            height: 180px;
            background: rgba(10, 10, 20, 0.9);
            border: 2px solid #e94560;
            border-radius: 8px;
        }

        /* ============ DEATH SCREEN ============ */
        #death-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        #death-screen h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 64px;
            color: #e94560;
            text-shadow: 0 0 40px rgba(233, 69, 96, 0.8);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        #death-screen button {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 20px;
            font-family: 'Orbitron', sans-serif;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            cursor: pointer;
        }

        /* ============ NOTIFICATIONS ============ */
        .notification {
            position: fixed;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            z-index: 200;
            animation: fadeOut 2s forwards;
        }

        .notification.error {
            background: rgba(255, 68, 68, 0.9);
            border: 1px solid #ff4444;
        }

        .notification.success {
            background: rgba(0, 255, 100, 0.9);
            border: 1px solid #00ff64;
        }

        .notification.info {
            background: rgba(68, 136, 255, 0.9);
            border: 1px solid #4488ff;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        /* ============ CROSSHAIR ============ */
        #crosshair {
            position: fixed;
            pointer-events: none;
            z-index: 10;
            display: none;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }

        #crosshair::before {
            width: 20px;
            height: 2px;
            left: -10px;
            top: -1px;
        }

        #crosshair::after {
            width: 2px;
            height: 20px;
            left: -1px;
            top: -10px;
        }
    </style>
</head>
<body>
    <!-- LOBBY SCREEN -->
    <div id="lobby-screen">
        <div class="lobby-bg"></div>
        <h1>SURVIVAL</h1>
        <div class="lobby-subtitle">ARENA</div>

        <div class="lobby-box">
            <input type="text" id="nickname-input" placeholder="Enter nickname" maxlength="15">
            <button id="create-btn">CREATE GAME</button>
            <button id="join-btn" style="margin-top: 10px; background: #333;">JOIN GAME</button>

            <div class="lobby-status waiting" id="lobby-status" style="display: none;">
                Waiting for players...
            </div>
        </div>

        <div class="lobby-info">
            WASD - Move | Click - Shoot/Build | 1-4 - Select Building | Q/E - Weapon
        </div>
    </div>

    <!-- GAME -->
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="crosshair"></div>

        <div id="ui-overlay">
            <div class="ui-panel">
                <h3>HEALTH</h3>
                <div class="value" id="hp-display">100</div>
                <div class="bar"><div class="bar-fill" id="hp-bar" style="width: 100%"></div></div>
            </div>
            <div class="ui-panel">
                <h3>MONEY</h3>
                <div class="value" id="money-display" style="color: #00ff64;">150</div>
            </div>
        </div>

        <div id="wave-timer">
            <div class="wave-label">WAVE <span id="wave-num">0</span></div>
            <div class="timer" id="wave-timer-val">3:00</div>
        </div>

        <canvas id="minimap"></canvas>

        <div id="hotbar">
            <div class="hotbar-slot active" data-slot="gun">
                <span class="key">Q</span>
                <span class="icon">🔫</span>
                <span class="name">Gun</span>
                <span class="ammo" id="ammo-display">50</span>
            </div>
        </div>

        <div id="build-menu">
            <div class="build-option" data-type="wall">
                <div class="key">1</div>
                <div class="name">Wall</div>
                <div class="cost">$50</div>
            </div>
            <div class="build-option" data-type="turret">
                <div class="key">2</div>
                <div class="name">Turret</div>
                <div class="cost">$100</div>
            </div>
            <div class="build-option" data-type="dril">
                <div class="key">3</div>
                <div class="name">Dril</div>
                <div class="cost">$150</div>
            </div>
            <div class="build-option" data-type="mine">
                <div class="key">4</div>
                <div class="name">Mine</div>
                <div class="cost">$75</div>
            </div>
        </div>
    </div>

    <!-- DEATH SCREEN -->
    <div id="death-screen">
        <h1>ELIMINATED</h1>
        <button id="respawn-btn">RESPAWN</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
