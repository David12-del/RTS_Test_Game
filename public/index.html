<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Arena</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #08080c;
            color: #eee;
            overflow: hidden;
            user-select: none;
        }

        /* ============ LOBBY ============ */
        #lobby-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a12 0%, #12121f 50%, #0a0a12 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #lobby-screen h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 52px;
            font-weight: 900;
            background: linear-gradient(135deg, #e94560, #ff6b6b, #4488ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle { color: #555; letter-spacing: 4px; font-size: 14px; margin-bottom: 35px; }

        .lobby-box {
            background: rgba(15, 15, 25, 0.95);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 14px;
            padding: 28px 35px;
            text-align: center;
            min-width: 340px;
        }

        .lobby-box input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            font-family: 'Rajdhani', sans-serif;
            border: 2px solid rgba(233, 69, 96, 0.4);
            border-radius: 7px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            margin-bottom: 12px;
        }

        .lobby-box input:focus { outline: none; border-color: #e94560; }

        .lobby-buttons { display: flex; gap: 10px; margin-bottom: 12px; }

        .lobby-box button {
            flex: 1;
            padding: 12px 18px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            border: none;
            border-radius: 7px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-create { background: linear-gradient(135deg, #e94560, #ff6b6b); }
        .btn-join { background: linear-gradient(135deg, #4488ff, #66aaff); }
        .btn-start { width: 100%; background: linear-gradient(135deg, #00aa55, #00cc66); display: none; }
        .btn-start.visible { display: block; }

        .lobby-box button:hover { transform: translateY(-2px); }

        .code-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .code-row input { width: 100px !important; text-align: center; letter-spacing: 6px; font-size: 18px !important; }

        .players-list { margin-top: 18px; text-align: left; }
        .players-list h3 { color: #e94560; font-size: 11px; letter-spacing: 2px; margin-bottom: 8px; }

        .player-row {
            display: flex; align-items: center; gap: 10px;
            padding: 7px 10px;
            background: rgba(30, 30, 50, 0.5);
            border-radius: 5px;
            margin-bottom: 5px;
        }

        .player-dot { width: 24px; height: 24px; border-radius: 50%; background: #4488ff; }
        .player-name { flex: 1; font-weight: 600; }
        .host-badge { font-size: 9px; color: #e94560; background: rgba(233,69,96,0.2); padding: 3px 6px; border-radius: 3px; }

        .lobby-status { margin-top: 12px; font-size: 13px; }
        .lobby-status.waiting { color: #ffcc00; }
        .lobby-status.playing { color: #00ff66; }

        .hint { color: #444; font-size: 11px; margin-top: 22px; }

        /* ============ GAME ============ */
        #game-container { display: none; width: 100vw; height: 100vh; }
        #gameCanvas { display: block; background: #08080c; }

        #ui-overlay { position: absolute; top: 12px; left: 12px; pointer-events: none; }

        .ui-panel {
            background: rgba(10, 10, 18, 0.9);
            border: 1px solid rgba(233, 69, 96, 0.4);
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 6px;
            backdrop-filter: blur(4px);
        }

        .ui-panel h3 { color: #e94560; font-size: 9px; letter-spacing: 2px; margin-bottom: 3px; }
        .ui-panel .value { font-size: 22px; font-weight: 700; font-family: 'Orbitron', sans-serif; }

        .hp-bar { margin-top: 5px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: linear-gradient(90deg, #e94560, #ff6b6b); transition: width 0.3s; }

        #wave-timer {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 18, 0.9);
            border: 1px solid rgba(233, 69, 96, 0.5);
            border-radius: 8px;
            padding: 8px 20px;
            text-align: center;
        }

        #wave-timer .wave-label { color: #e94560; font-size: 10px; letter-spacing: 2px; }
        #wave-timer .timer { color: #fff; font-size: 24px; font-weight: 900; font-family: 'Orbitron', sans-serif; }

        #minimap {
            position: absolute; top: 12px; right: 12px;
            width: 140px; height: 140px;
            background: rgba(10, 10, 18, 0.9);
            border: 2px solid #e94560;
            border-radius: 6px;
        }

        #crosshair {
            position: fixed; pointer-events: none; z-index: 10; display: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255,255,255,0.8);
        }
        #crosshair::before { width: 14px; height: 2px; left: -7px; top: -1px; }
        #crosshair::after { width: 2px; height: 14px; left: -1px; top: -7px; }

        /* ============ HOTBAR ============ */
        #hotbar {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 5px;
            background: rgba(10, 10, 18, 0.9);
            border: 1px solid rgba(233, 69, 96, 0.4);
            border-radius: 8px;
            padding: 6px 10px;
        }

        .hotbar-slot {
            width: 44px; height: 44px;
            background: rgba(30, 30, 50, 0.8);
            border: 2px solid #333;
            border-radius: 6px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .hotbar-slot.active { border-color: #e94560; background: rgba(233, 69, 96, 0.2); }
        .hotbar-slot .icon { font-size: 18px; }

        /* ============ BUILD MENU ============ */
        #build-menu {
            position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
            display: none; gap: 8px;
            background: rgba(10, 10, 18, 0.95);
            border: 1px solid rgba(68, 136, 255, 0.5);
            border-radius: 10px;
            padding: 12px;
        }

        #build-menu.visible { display: flex; }

        .build-option {
            text-align: center;
            padding: 10px 14px;
            border-radius: 6px;
            background: rgba(30, 30, 50, 0.8);
            border: 2px solid #333;
            transition: 0.2s;
            min-width: 70px;
        }

        .build-option:hover { border-color: #4488ff; background: rgba(68, 136, 255, 0.15); }
        .build-option.active { border-color: #4488ff; background: rgba(68, 136, 255, 0.3); }

        .build-option .key { font-size: 12px; color: #4488ff; font-weight: bold; }
        .build-option .name { font-size: 12px; color: #fff; margin: 3px 0; }
        .build-option .cost { font-size: 10px; color: #00ff64; }

        /* ============ DEATH ============ */
        #death-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 50;
        }

        #death-screen h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            color: #e94560;
            text-shadow: 0 0 30px rgba(233, 69, 96, 0.8);
        }

        #death-screen button {
            margin-top: 25px;
            padding: 12px 35px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            border: none;
            border-radius: 7px;
            background: #e94560;
            color: #fff;
            cursor: pointer;
        }

        /* ============ NOTIFICATIONS ============ */
        .notification {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 13px; font-weight: 700;
            z-index: 200;
            animation: fadeOut 2s forwards;
        }

        .notification.error { background: rgba(255, 50, 50, 0.9); }
        .notification.info { background: rgba(68, 136, 255, 0.9); }

        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <!-- LOBBY -->
    <div id="lobby-screen">
        <h1>SURVIVAL</h1>
        <div class="subtitle">ARENA</div>

        <div class="lobby-box">
            <input type="text" id="nickname" placeholder="Nickname" maxlength="15">

            <div class="lobby-buttons">
                <button class="btn-create" id="create-btn">CREATE</button>
                <button class="btn-join" id="join-btn">JOIN</button>
            </div>

            <div class="code-row" id="code-row" style="display:none">
                <input type="text" id="room-code" placeholder="0000" maxlength="4">
            </div>

            <button class="btn-start btn-create" id="start-btn">START GAME</button>

            <div class="players-list" id="players-list" style="display:none">
                <h3>PLAYERS</h3>
                <div id="players-container"></div>
            </div>

            <div class="lobby-status" id="lobby-status"></div>

            <div class="hint">WASD - Move | Click - Shoot | B - Build Menu</div>
        </div>
    </div>

    <!-- GAME -->
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="crosshair"></div>

        <div id="ui-overlay">
            <div class="ui-panel">
                <h3>HEALTH</h3>
                <div class="value" id="hp-display">100</div>
                <div class="hp-bar"><div class="hp-bar-fill" id="hp-bar" style="width:100%"></div></div>
            </div>
            <div class="ui-panel">
                <h3>MONEY</h3>
                <div class="value" id="money-display" style="color:#00ff66">80</div>
            </div>
        </div>

        <div id="wave-timer">
            <div class="wave-label">WAVE <span id="wave-num">0</span></div>
            <div class="timer" id="wave-timer-val">1:30</div>
        </div>

        <canvas id="minimap"></canvas>

        <div id="hotbar">
            <div class="hotbar-slot active">
                <span class="icon">🔫</span>
            </div>
        </div>

        <div id="build-menu">
            <div class="build-option" data-type="wall">
                <div class="key">1</div>
                <div class="name">Wall</div>
                <div class="cost">$30</div>
            </div>
            <div class="build-option" data-type="turret">
                <div class="key">2</div>
                <div class="name">Turret</div>
                <div class="cost">$50</div>
            </div>
            <div class="build-option" data-type="dril">
                <div class="key">3</div>
                <div class="name">Dril</div>
                <div class="cost">$80</div>
            </div>
            <div class="build-option" data-type="mine">
                <div class="key">4</div>
                <div class="name">Mine</div>
                <div class="cost">$40</div>
            </div>
        </div>
    </div>

    <!-- DEATH -->
    <div id="death-screen">
        <h1>ELIMINATED</h1>
        <button id="respawn-btn">RESPAWN</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
